<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfida CCNA</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #0ea5e9; --correct: #10b981; --wrong: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 700px; margin-top: 40px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h1 { margin: 0; color: #0f172a; font-size: 1.6rem; }
        .btn-home { color: #64748b; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .progress { font-size: 0.9rem; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: #1e293b; }
        .option { background-color: #ffffff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; color: #334155; }
        .option:hover { background-color: #f0f9ff; border-color: var(--primary); }
        .option.correct { background-color: #d1fae5 !important; border-color: var(--correct); color: #065f46; font-weight: bold; }
        .option.wrong { background-color: #fee2e2 !important; border-color: var(--wrong); color: #991b1b; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #f0f9ff; border-left: 5px solid var(--primary); color: #0369a1; }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        
        /* Stili per il risultato finale */
        .result-box { text-align: center; padding: 20px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 0 auto 20px; }
        .status-msg { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">← Torna alla Dashboard</a>
    <div class="header">
        <div class="progress" id="progress">Caricamento...</div>
        <h1 id="quiz-title">Caricamento Quiz...</h1>
    </div>
    <div id="quiz-box">
        <div class="question" id="q-text"></div>
        <div id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda →</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentTopic = urlParams.get('topic'); 
    const moduleInfo = ccnaData.modules.find(m => m.id === currentTopic);
    const questionPool = ccnaData.questions[currentTopic] || [];

    if(!moduleInfo || questionPool.length === 0) {
        document.getElementById('quiz-box').innerHTML = "<p>Errore: Quiz non trovato o database vuoto.</p>";
    } else {
        document.getElementById('quiz-title').innerText = "Quiz: " + moduleInfo.title;

        function seededRandom(seed) { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }
        const today = new Date();
        const todaySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

        function getDailyQuestions(pool, seed, amount) {
            let shuffled = [...pool]; let localSeed = seed;
            for (let i = shuffled.length - 1; i > 0; i--) {
                let j = Math.floor(seededRandom(localSeed++) * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, Math.min(amount, pool.length));
        }

        // --- CAMBIAMENTO: ORA 30 DOMANDE ---
        const NUM_DOMANDE = 30; 
        const quizData = getDailyQuestions(questionPool, todaySeed, NUM_DOMANDE);

        let current = 0; 
        let answered = false;
        let correctCount = 0; // Contatore risposte esatte

        function loadQ() {
            answered = false; const d = quizData[current];
            document.getElementById('progress').innerText = `Domanda ${current+1} di ${quizData.length}`;
            document.getElementById('q-text').innerText = d.q;
            const optCont = document.getElementById('options'); optCont.innerHTML = '';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            d.a.forEach((o, i) => {
                const btn = document.createElement('div'); btn.className = 'option';
                btn.innerText = o; btn.onclick = () => check(i, btn);
                optCont.appendChild(btn);
            });
        }

        function check(i, btn) {
            if(answered) return; answered = true; const d = quizData[current];
            const opts = document.getElementsByClassName('option');
            if(i === d.c) {
                btn.classList.add('correct');
                correctCount++; // Incrementa punteggio
            } else {
                btn.classList.add('wrong');
                opts[d.c].classList.add('correct');
            }
            document.getElementById('feedback').innerHTML = `<strong>Spiegazione:</strong> ${d.f}`;
            document.getElementById('feedback').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function getFinalFeedback(score, total) {
            const percent = (score / total) * 100;
            if (percent >= 90) return { msg: "Sei un mostro! 🏆 Pronto per l'esame!", color: "#10b981" };
            if (percent >= 70) return { msg: "Bravo! Sei sulla strada giusta. 👍", color: "#0ea5e9" };
            if (percent >= 50) return { msg: "Non male, ma serve un altro po' di ripasso. 📚", color: "#f59e0b" };
            return { msg: "Cavolo, non ci siamo ancora. Riprova! ❌", color: "#ef4444" };
        }

        function nextQuestion() {
            current++; 
            if(current < quizData.length) {
                loadQ();
            } else {
                const result = getFinalFeedback(correctCount, quizData.length);
                document.getElementById('quiz-box').innerHTML = `
                    <div class="result-box">
                        <div class="score-circle" style="background:${result.color}">${correctCount}/${quizData.length}</div>
                        <div class="status-msg">${result.msg}</div>
                        <p>Hai risposto correttamente al ${Math.round((correctCount/quizData.length)*100)}% delle domande.</p>
                        <a href='index.html' style='display:inline-block; margin-top:20px; color:#0ea5e9; font-weight:bold; text-decoration:none;'>← Torna alla Dashboard</a>
                    </div>
                `;
            }
        }
        loadQ();
    }
</script>
</body>
</html>
