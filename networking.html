<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domande Networking di Simulazione</title>
    <style>
        :root { --primary: #3b82f6; --correct: #22c55e; --wrong: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px; margin-top: 40px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.6rem; }
        .progress { font-size: 0.9rem; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .btn-home { color: #64748b; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: #334155; }
        .option { background-color: #ffffff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; color: #475569; }
        .option:hover { background-color: #f8fafc; border-color: var(--primary); }
        .option.correct { background-color: #dcfce7 !important; border-color: var(--correct); color: #166534; font-weight: bold; }
        .option.wrong { background-color: #fee2e2 !important; border-color: var(--wrong); color: #991b1b; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #eff6ff; border-left: 5px solid var(--primary); color: #1e3a8a; }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">← Home</a>
    <div class="header">
        <div class="progress" id="progress">Caricamento...</div>
        <h1>Domande Networking di Simulazione</h1>
    </div>
    <div id="quiz-box">
        <div class="question" id="q-text"></div>
        <div id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda →</button>
    </div>
</div>

<script>
const quizData = [
    { q: "Qual è la funzione del protocollo ARP?", a: ["Associare IP a MAC", "Risolvere nomi DNS", "Assegnare IP dinamici", "Routing"], c: 0, f: "ARP associa un indirizzo logico (IP) a uno fisico (MAC) sulla rete locale." },
    { q: "Quale livello OSI si occupa del routing?", a: ["Fisico", "Data Link", "Network", "Transport"], c: 2, f: "Il Livello 3 (Network) gestisce l'instradamento dei pacchetti tramite indirizzi IP." },
    { q: "Cos'è il Default Gateway?", a: ["Un server DNS", "L'indirizzo del router per uscire dalla LAN", "Il MAC address del PC", "Uno Switch"], c: 1, f: "È il punto di uscita di una rete locale verso reti esterne o Internet." },
    { q: "Porta standard del protocollo HTTPS?", a: ["80", "21", "443", "22"], c: 2, f: "HTTPS usa la 443; HTTP (non sicuro) usa la 80." },
    { q: "A cosa serve il comando 'ping'?", a: ["Scaricare file", "Testare la connettività (ICMP)", "Configurare il router", "Vedere i MAC"], c: 1, f: "Invia pacchetti ICMP Echo Request per verificare se un host risponde." },
    { q: "Quale protocollo garantisce la consegna affidabile dei dati?", a: ["UDP", "IP", "TCP", "ICMP"], c: 2, f: "TCP è connection-oriented e garantisce l'integrità e l'ordine dei dati." },
    { q: "Cosa fa il protocollo DHCP?", a: ["Risolve i nomi", "Assegna indirizzi IP automaticamente", "Cripta i pacchetti", "Gestisce le VLAN"], c: 1, f: "Dynamic Host Configuration Protocol fornisce IP, subnet e gateway ai client." },
    { q: "Esempio di indirizzo IP privato Classe C:", a: ["8.8.8.8", "192.168.1.1", "172.16.0.1", "10.0.0.1"], c: 1, f: "La rete 192.168.x.x è tipica delle LAN domestiche e aziendali." },
    { q: "Cosa identifica l'indirizzo MAC?", a: ["La posizione geografica", "L'interfaccia hardware fisica", "Il nome del PC", "L'utente"], c: 1, f: "È un indirizzo univoco di 48 bit impresso nella scheda di rete (NIC)." },
    { q: "Maschera di sottorete standard per una /24?", a: ["255.0.0.0", "255.255.0.0", "255.255.255.0", "255.255.255.255"], c: 2, f: "/24 significa che i primi 24 bit sono a 1 (255.255.255.0)." },
    { q: "Il DNS trasforma:", a: ["IP in MAC", "Nomi di dominio in IP", "Testo in binario", "HTTP in FTP"], c: 1, f: "Domain Name System permette di usare 'google.it' invece di un IP numerico." },
    { q: "Porta standard per il servizio SSH?", a: ["20", "21", "22", "23"], c: 2, f: "SSH (Secure Shell) usa la porta 22." },
    { q: "Uno Switch lavora principalmente al livello:", a: ["1", "2", "3", "4"], c: 1, f: "Gli switch operano al livello Data Link (L2) usando i MAC address." },
    { q: "Quale protocollo usa il comando 'traceroute'?", a: ["TCP", "UDP/ICMP", "HTTP", "FTP"], c: 1, f: "Traceroute usa pacchetti UDP (Linux) o ICMP (Windows) con TTL crescenti." },
    { q: "Indirizzo di Loopback IPv4?", a: ["192.168.0.1", "127.0.0.1", "10.0.0.1", "0.0.0.0"], c: 1, f: "127.0.0.1 punta alla macchina locale (localhost)." },
    { q: "Quanti bit ha un indirizzo IPv6?", a: ["32", "48", "64", "128"], c: 3, f: "IPv6 usa 128 bit, permettendo un numero quasi infinito di indirizzi." },
    { q: "Cosa fa il NAT?", a: ["Cripta file", "Traduce IP privati in IP pubblici", "Accelera Internet", "Pulisce i virus"], c: 1, f: "Network Address Translation permette a un'intera LAN di uscire con un solo IP pubblico." },
    { q: "In quale livello OSI lavora l'FTP?", a: ["Trasporto", "Sessione", "Applicazione", "Presentazione"], c: 2, f: "FTP è un protocollo di livello Applicazione (L7)." },
    { q: "Tipo di cavo per connettore RJ45?", a: ["Fibra", "Coassiale", "Ethernet (Twisted Pair)", "Seriale"], c: 2, f: "RJ45 è lo standard per i cavi di rete in rame UTP/STP." },
    { q: "VLAN serve a:", a: ["Aumentare la velocità", "Creare reti logiche separate su uno switch", "Navigare anonimi", "Caricare file"], c: 1, f: "Virtual LAN isolano il traffico tra gruppi di porte nello stesso switch." },
    { q: "Protocollo per l'invio delle email?", a: ["POP3", "IMAP", "SMTP", "HTTP"], c: 2, f: "SMTP (Simple Mail Transfer Protocol) è usato per spedire mail al server." },
    { q: "Significato di Full-Duplex:", a: ["Solo invio", "Invio e ricezione non simultanei", "Invio e ricezione simultanei", "Solo ricezione"], c: 2, f: "Permette il transito dei dati in entrambe le direzioni nello stesso momento." },
    { q: "Porta usata dal DNS?", a: ["53", "67", "68", "110"], c: 0, f: "Il DNS usa principalmente la porta 53 UDP." },
    { q: "Indirizzo di Broadcast per 192.168.1.0/24?", a: ["192.168.1.0", "192.168.1.1", "192.168.1.254", "192.168.1.255"], c: 3, f: "L'ultimo indirizzo utile della subnet è il broadcast." },
    { q: "Cos'è il TTL in un pacchetto IP?", a: ["Tempo di attesa", "Time To Live (limite salti)", "Taglia pacchetto", "Tipo di linea"], c: 1, f: "Indica quanti router può attraversare il pacchetto prima di essere scartato." },
    { q: "Quale protocollo NON è connection-oriented?", a: ["TCP", "UDP", "HTTP", "SSH"], c: 1, f: "UDP invia pacchetti senza verificare se arrivano (best effort)." },
    { q: "Funzione del Firewall:", a: ["Raffreddare il server", "Filtrare traffico in base a regole", "Creare siti", "Backup"], c: 1, f: "Protegge la rete bloccando accessi non autorizzati." },
    { q: "Quale apparato connette reti diverse?", a: ["Hub", "Switch", "Router", "Bridge"], c: 2, f: "Il router instrada i dati tra reti con indirizzamento differente." },
    { q: "Velocità rete Gigabit?", a: ["10 Mbps", "100 Mbps", "1000 Mbps", "10000 Mbps"], c: 2, f: "Gigabit Ethernet indica 1000 Megabit per secondo." },
    { q: "Protocollo per gestione apparati?", a: ["SNMP", "SMTP", "ICMP", "IGMP"], c: 0, f: "SNMP serve per monitorare e gestire i dispositivi di rete." }
];

let current = 0; let answered = false;
function loadQ() {
    answered = false; const d = quizData[current];
    document.getElementById('progress').innerText = `Domanda ${current+1} di ${quizData.length}`;
    document.getElementById('q-text').innerText = d.q;
    const optCont = document.getElementById('options'); optCont.innerHTML = '';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    d.a.forEach((o, i) => {
        const btn = document.createElement('div'); btn.className = 'option';
        btn.innerText = o; btn.onclick = () => check(i, btn);
        optCont.appendChild(btn);
    });
}
function check(i, btn) {
    if(answered) return; answered = true; const d = quizData[current];
    const opts = document.getElementsByClassName('option');
    if(i === d.c) btn.classList.add('correct');
    else { btn.classList.add('wrong'); opts[d.c].classList.add('correct'); }
    document.getElementById('feedback').innerHTML = `<strong>Spiegazione:</strong> ${d.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}
function nextQuestion() {
    current++; if(current < quizData.length) loadQ();
    else document.getElementById('quiz-box').innerHTML = "<h2>Quiz Completato! 🏆</h2><a href='index.html' style='color:#3b82f6;'>Torna alla Home</a>";
}
loadQ();
</script>
</body>
</html>
