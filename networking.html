<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domande Networking di Simulazione</title>
    <style>
        :root { --primary: #3b82f6; --correct: #22c55e; --wrong: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px; margin-top: 40px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.6rem; }
        .btn-home { color: #64748b; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: #334155; }
        .option { background-color: #ffffff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; color: #475569; }
        .option:hover { background-color: #f8fafc; border-color: var(--primary); }
        .option.correct { background-color: #dcfce7 !important; border-color: var(--correct); color: #166534; font-weight: bold; }
        .option.wrong { background-color: #fee2e2 !important; border-color: var(--wrong); color: #991b1b; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #eff6ff; border-left: 5px solid var(--primary); color: #1e3a8a; }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .progress { font-size: 0.85rem; color: #64748b; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">← Torna alla Dashboard</a>
    <div class="header">
        <div class="progress" id="progress">Domanda 1 di 30</div>
        <h1>Domande Networking di Simulazione</h1>
    </div>
    <div id="quiz-box">
        <div class="question" id="q-text"></div>
        <div id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda</button>
    </div>
</div>

<script>
const quizData = [
    { q: "Qual è la funzione principale del protocollo ARP?", a: ["Associare IP a MAC", "Risolvere nomi DNS", "Assegnare IP dinamici", "Routing pacchetti"], c: 0, f: "ARP associa un indirizzo logico (IP) a uno fisico (MAC)." },
    { q: "Quale livello OSI gestisce il routing?", a: ["Fisico", "Data Link", "Network", "Transport"], c: 2, f: "Il livello 3 (Network) si occupa dell'instradamento tramite IP." },
    { q: "Default Gateway indica:", a: ["Server DNS", "Router per uscire dalla rete locale", "Indirizzo del client", "Switch principale"], c: 1, f: "È l'interfaccia del router che instrada i pacchetti fuori dalla LAN." },
    { q: "Porta standard HTTPS?", a: ["80", "21", "443", "22"], c: 2, f: "HTTPS usa la 443; HTTP usa la 80." },
    { q: "A cosa serve il comando 'ping'?", a: ["Scaricare file", "Testare connettività", "Vedere password", "Cambiare IP"], c: 1, f: "Invia pacchetti ICMP per vedere se un host è raggiungibile." },
    { q: "Quale protocollo garantisce la consegna affidabile dei dati?", a: ["UDP", "IP", "TCP", "ICMP"], c: 2, f: "TCP è connection-oriented e garantisce la consegna ordinata dei dati." },
    { q: "Cosa fa il protocollo DHCP?", a: ["Risolve i nomi", "Assegna IP automaticamente", "Cripta i dati", "Controlla i virus"], c: 1, f: "Dynamic Host Configuration Protocol assegna IP, Maschera e Gateway." },
    { q: "Quale di questi è un indirizzo IP privato?", a: ["8.8.8.8", "192.168.1.1", "172.217.0.1", "151.10.20.30"], c: 1, f: "Le classi private includono 10.x, 172.16.x e 192.168.x." },
    { q: "Cosa identifica l'indirizzo MAC?", a: ["La posizione geografica", "L'interfaccia di rete fisica", "L'utente del PC", "Il dominio"], c: 1, f: "È un indirizzo univoco di 48 bit impresso nella scheda di rete (NIC)." },
    { q: "Qual è la maschera di sottorete standard per una /24?", a: ["255.0.0.0", "255.255.0.0", "255.255.255.0", "255.255.255.255"], c: 2, f: "/24 corrisponde a tre ottetti a 1 (255.255.255.0)." },
    { q: "Il protocollo DNS trasforma:", a: ["IP in MAC", "Nomi in IP", "Testo in Binario", "HTTP in HTTPS"], c: 1, f: "Il Domain Name System traduce nomi mnemonici (google.it) in IP." },
    { q: "Quale porta usa il protocollo SSH?", a: ["20", "21", "22", "23"], c: 2, f: "SSH usa la porta 22; Telnet la 23; FTP la 21." },
    { q: "Cos'è uno Switch?", a: ["Dispositivo di livello 1", "Dispositivo di livello 2", "Dispositivo di livello 3", "Un software"], c: 1, f: "Lo switch lavora al livello Data Link usando i MAC address." },
    { q: "Quale protocollo usa il comando 'traceroute'?", a: ["TCP", "UDP/ICMP", "HTTP", "FTP"], c: 1, f: "Traceroute usa pacchetti UDP o ICMP con valori TTL crescenti." },
    { q: "Indirizzo di Loopback IPv4?", a: ["192.168.0.1", "127.0.0.1", "10.0.0.1", "0.0.0.0"], c: 1, f: "127.0.0.1 punta alla macchina stessa (localhost)." },
    { q: "Quanti bit ha un indirizzo IPv6?", a: ["32", "48", "64", "128"], c: 3, f: "IPv4 ha 32 bit, IPv6 ne ha 128 (esadecimale)." },
    { q: "Cosa fa il NAT?", a: ["Cripta i file", "Traduce IP privati in IP pubblici", "Velocizza Internet", "Backup dati"], c: 1, f: "Network Address Translation permette a più dispositivi privati di usare un unico IP pubblico." },
    { q: "In quale livello OSI lavora il protocollo FTP?", a: ["Trasporto", "Sessione", "Applicazione", "Presentazione"], c: 2, f: "FTP è un protocollo di alto livello (Livello 7)." },
    { q: "Quale cavo usa il connettore RJ45?", a: ["Fibra", "Coassiale", "Ethernet (Twisted Pair)", "Seriale"], c: 2, f: "RJ45 è lo standard per i cavi di rete in rame." },
    { q: "VLAN serve a:", a: ["Aumentare la velocità", "Creare reti logiche separate su uno switch fisico", "Navigare anonimi", "Pulire i virus"], c: 1, f: "Le Virtual LAN isolano il traffico all'interno dello stesso switch." },
    { q: "Protocollo per invio email?", a: ["POP3", "IMAP", "SMTP", "HTTP"], c: 2, f: "SMTP (Simple Mail Transfer Protocol) serve per l'invio." },
    { q: "Cosa significa Full-Duplex?", a: ["Trasmissione in un solo senso", "Trasmissione alternata", "Trasmissione simultanea in due sensi", "Nessuna trasmissione"], c: 2, f: "Permette di inviare e ricevere dati contemporaneamente." },
    { q: "Quale porta usa il DNS?", a: ["53", "67", "68", "110"], c: 0, f: "Il DNS usa principalmente la porta 53 UDP." },
    { q: "Indirizzo di Broadcast per 192.168.1.0/24?", a: ["192.168.1.0", "192.168.1.1", "192.168.1.254", "192.168.1.255"], c: 3, f: "L'ultimo indirizzo della subnet è riservato al broadcast." },
    { q: "Cos'è il TTL in un pacchetto IP?", a: ["Tempo di caricamento", "Time To Live (limite di salti tra router)", "Taglia del file", "Tipo di linea"], c: 1, f: "Evita che i pacchetti girino all'infinito in caso di loop di routing." },
    { q: "Quale protocollo NON è connection-oriented?", a: ["TCP", "UDP", "HTTP", "SSH"], c: 1, f: "UDP invia pacchetti senza verificare se arrivano (best-effort)." },
    { q: "Il Firewall serve a:", a: ["Raffreddare il PC", "Filtrare il traffico in base a regole", "Aumentare lo spazio disco", "Deframmentare"], c: 1, f: "Protegge la rete bloccando accessi non autorizzati." },
    { q: "Quale dispositivo connette reti diverse?", a: ["Hub", "Switch", "Router", "Bridge"], c: 2, f: "Il router instrada il traffico tra reti con indirizzamento diverso." },
    { q: "Velocità di una rete Gigabit?", a: ["10 Mbps", "100 Mbps", "1000 Mbps", "10000 Mbps"], c: 2, f: "Gigabit Ethernet = 1000 Megabit per secondo." },
    { q: "Protocollo per gestire dispositivi di rete?", a: ["SNMP", "SMTP", "ICMP", "IGMP"], c: 0, f: "SNMP serve per il monitoraggio e la gestione degli apparati." }
];

let current = 0; let answered = false;
function loadQ() {
    answered = false; const d = quizData[current];
    document.getElementById('progress').innerText = `Domanda ${current+1} di ${quizData.length}`;
    document.getElementById('q-text').innerText = d.q;
    const optCont = document.getElementById('options'); optCont.innerHTML = '';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    d.a.forEach((o, i) => {
        const btn = document.createElement('div'); btn.className = 'option';
        btn.innerText = o; btn.onclick = () => check(i, btn);
        optCont.appendChild(btn);
    });
}
function check(i, btn) {
    if(answered) return; answered = true; const d = quizData[current];
    const opts = document.getElementsByClassName('option');
    if(i === d.c) btn.classList.add('correct');
    else { btn.classList.add('wrong'); opts[d.c].classList.add('correct'); }
    document.getElementById('feedback').innerHTML = `<strong>Spiegazione:</strong> ${d.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}
function nextQuestion() {
    current++; if(current < quizData.length) loadQ();
    else document.getElementById('quiz-box').innerHTML = "<h2>Fine Quiz Networking! 🌐</h2><a href='index.html' style='display:block; text-align:center; margin-top:20px; color:#3b82f6;'>Torna alla Home</a>";
}
loadQ();
</script>
</body>
</html>
