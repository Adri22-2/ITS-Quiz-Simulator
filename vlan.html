<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfida Giornaliera: VLAN & Trunking</title>
    <style>
        :root { --primary: #0ea5e9; --correct: #10b981; --wrong: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 700px; margin-top: 40px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h1 { margin: 0; color: #0f172a; font-size: 1.6rem; }
        .btn-home { color: #64748b; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .progress { font-size: 0.9rem; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: #1e293b; }
        .option { background-color: #ffffff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; color: #334155; }
        .option:hover { background-color: #f0f9ff; border-color: var(--primary); }
        .option.correct { background-color: #d1fae5 !important; border-color: var(--correct); color: #065f46; font-weight: bold; }
        .option.wrong { background-color: #fee2e2 !important; border-color: var(--wrong); color: #991b1b; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #f0f9ff; border-left: 5px solid var(--primary); color: #0369a1; }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">← Dashboard</a>
    <div class="header">
        <div class="progress" id="progress">Caricamento...</div>
        <h1>VLAN & Trunking Quiz</h1>
    </div>
    <div id="quiz-box">
        <div class="question" id="q-text"></div>
        <div id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda →</button>
    </div>
</div>

<script>
const questionPool = [
    { q: "Qual è la funzione di una VLAN?", a: ["Unire più switch", "Creare domini di broadcast logici", "Velocizzare la RAM", "Sostituire il router"], c: 1, f: "Le VLAN segmentano la rete isolando il traffico broadcast a livello logico." },
    { q: "Range delle VLAN Standard?", a: ["1-4094", "1-1005", "1006-4094", "1-1024"], c: 1, f: "Le VLAN standard vanno da 1 a 1005." },
    { q: "Quanti byte aggiunge il tag 802.1Q?", a: ["2", "4", "8", "12"], c: 1, f: "Il protocollo 802.1Q aggiunge un campo di 4 byte nell'header Ethernet." },
    { q: "La Native VLAN predefinita Cisco è:", a: ["VLAN 0", "VLAN 1", "VLAN 100", "VLAN 999"], c: 1, f: "Per default, la VLAN 1 è la Native VLAN su tutti i trunk." },
    { q: "Cosa succede ai frame della Native VLAN su un trunk?", a: ["Vengono scartati", "Vengono inviati senza tag", "Vengono criptati", "Vengono duplicati"], c: 1, f: "La Native VLAN è l'unica che attraversa il trunk senza tag 802.1Q." },
    { q: "Quale comando crea la VLAN 10?", a: ["vlan Participation 10", "vlan 10", "set vlan 10", "int vlan 10"], c: 1, f: "In config globale, si usa semplicemente 'vlan [ID]'." },
    { q: "Cos'è il Router-on-a-Stick?", a: ["Uno switch L3", "Un router con una singola interfaccia fisica divisa in subinterfaces", "Un cavo rotto", "Un attacco hacker"], c: 1, f: "Usa subinterfaces logiche per fare routing tra VLAN diverse." },
    { q: "DTP Dynamic Auto + Dynamic Auto produce:", a: ["Trunk", "Access port", "Shutdown", "Loop"], c: 1, f: "Essendo entrambi passivi, non negozieranno mai un trunk e rimarranno in access." },
    { q: "VTP Transparent Mode:", a: ["Sincronizza il database", "Inoltra update VTP ma non sincronizza localmente", "Crea VLAN globali", "Spegne lo switch"], c: 1, f: "Inoltra i messaggi ma gestisce il suo database in modo indipendente." },
    { q: "VTP Revision Number indica:", a: ["La versione software", "Il numero di modifiche al database VLAN", "La velocità del link", "L'indirizzo IP"], c: 1, f: "Lo switch con revisione più alta aggiorna gli altri nel dominio." },
    { q: "Le VLAN 1002-1005 sono:", a: ["Extended", "Riservate per Token Ring/FDDI", "Native", "Inesistenti"], c: 1, f: "Sono ID storici riservati e non eliminabili." },
    { q: "Il database VLAN standard è salvato in:", a: ["running-config", "vlan.dat", "startup-config", "ROM"], c: 1, f: "Il file vlan.dat si trova nella memoria flash dello switch." },
    { q: "Comando per vedere le porte nelle VLAN?", a: ["show vlan brief", "show ip route", "show interfaces trunk", "show mac-address-table"], c: 0, f: "Mostra lo stato di tutte le VLAN e le porte associate." },
    { q: "IEEE 802.1Q è un protocollo:", a: ["Proprietario Cisco", "Standard aperto", "Layer 3", "Wireless"], c: 1, f: "È lo standard industriale utilizzato da tutti i vendor." },
    { q: "Cosa fa 'switchport mode access'?", a: ["Crea un trunk", "Forza la porta a essere membro di una sola VLAN per un host", "Spegne la porta", "Cambia IP"], c: 1, f: "Imposta la porta per collegare un PC finale." },
    { q: "Cos'è l'SVI?", a: ["Un cavo", "Switched Virtual Interface (gateway logico)", "Un protocollo di routing", "Un tipo di switch"], c: 1, f: "È l'interfaccia virtuale (es. int vlan 10) usata per il routing o il management." },
    { q: "Wildcard mask per VLAN ID nel tag?", a: ["10-bit", "12-bit", "16-bit", "24-bit"], c: 1, f: "Il campo VLAN ID è di 12 bit (4096 valori possibili)." },
    { q: "VTP Pruning serve a:", a: ["Cancellare VLAN", "Limitare il broadcast inutile sui trunk", "Criptare dati", "Nessuna delle precedenti"], c: 1, f: "Rimuove il traffico per VLAN che non hanno porte attive sull'altro lato." },
    { q: "Native VLAN Mismatch causa:", a: ["Spegne lo switch", "Leakage di traffico tra VLAN diverse", "Velocizza il link", "Nulla"], c: 1, f: "È un grave rischio di sicurezza e malfunzionamento." },
    { q: "Interface g0/0.10 significa:", a: ["Porta fisica 10", "Subinterface logica", "VLAN 10 fisica", "Errore"], c: 1, f: "È la sintassi Cisco per le subinterfaces." },
    { q: "Protocollo ISL è:", a: ["Attuale", "Proprietario Cisco e legacy", "Standard aperto", "IPv6"], c: 1, f: "Sostituito quasi ovunque dallo standard 802.1Q." },
    { q: "Le VLAN 1006-4094 sono:", a: ["Normal", "Extended", "Native", "Inutilizzabili"], c: 1, f: "Range esteso per provider e grandi reti." },
    { q: "Uno switch L2 fa routing?", a: ["Sì", "No, serve logica L3", "Solo se ha molte porte", "Solo con VTP"], c: 1, f: "Gli switch L2 inoltrano solo in base ai MAC address." },
    { q: "VLAN Hopping è:", a: ["Un comando", "Un attacco per saltare da una VLAN all'altra", "Un metodo di backup", "Un tipo di cavo"], c: 1, f: "Sfrutta errori di configurazione trunk per violare l'isolamento." },
    { q: "Stato porta se non è Trunk né Access?", a: ["Down", "Dynamic", "Blocking", "Listening"], c: 1, f: "Tenta di negoziare la modalità via DTP." },
    { q: "Comando per allowed VLAN su trunk?", a: ["switchport trunk allowed vlan [id]", "vlan participation", "trunk open", "access list"], c: 0, f: "Specifica quali VLAN possono passare sul link." },
    { q: "VTP Revision 0 si ottiene:", a: ["Riavviando", "Cambiando nome dominio VTP", "Formattando", "Comando 'reset'"], c: 1, f: "Cambiare il nome dominio resetta il contatore revisione." },
    { q: "Un'area 'Stub' in VTP:", a: ["Non esiste", "Riceve solo VLAN 1", "È lo switch transparent", "Non inoltra nulla"], c: 0, f: "Stai confondendo con OSPF! In VTP non ci sono aree stub." },
    { q: "Lo switchport nonegotiate richiede:", a: ["DTP", "Porta forzata manualmente (static)", "VTP v3", "DHCP"], c: 1, f: "Disabilita DTP, quindi la porta deve essere già definita." },
    { q: "Il tag 802.1Q si trova tra:", a: ["MAC e IP", "Source MAC e EtherType", "IP e TCP", "Fine del frame"], c: 1, f: "Viene inserito nell'header Ethernet originale." }
];

// LOGICA SEED GIORNALIERO
function seededRandom(seed) { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }
const today = new Date();
const todaySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

function getDailyQuestions(pool, seed, amount) {
    let shuffled = [...pool]; let localSeed = seed;
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(seededRandom(localSeed++) * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, amount);
}

const NUM_DOMANDE_AL_GIORNO = 20; 
const quizData = getDailyQuestions(questionPool, todaySeed, NUM_DOMANDE_AL_GIORNO);

let current = 0; let answered = false;

function loadQ() {
    answered = false; const d = quizData[current];
    document.getElementById('progress').innerText = `Domanda ${current+1} di ${quizData.length}`;
    document.getElementById('q-text').innerText = d.q;
    const optCont = document.getElementById('options'); optCont.innerHTML = '';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    d.a.forEach((o, i) => {
        const btn = document.createElement('div'); btn.className = 'option';
        btn.innerText = o; btn.onclick = () => check(i, btn);
        optCont.appendChild(btn);
    });
}

function check(i, btn) {
    if(answered) return; answered = true; const d = quizData[current];
    const opts = document.getElementsByClassName('option');
    if(i === d.c) btn.classList.add('correct');
    else { btn.classList.add('wrong'); opts[d.c].classList.add('correct'); }
    document.getElementById('feedback').innerHTML = `<strong>Spiegazione:</strong> ${d.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    current++; 
    if(current < quizData.length) loadQ();
    else document.getElementById('quiz-box').innerHTML = "<h2>Ottimo lavoro! 🏆</h2><p>Hai completato la sfida VLAN di oggi. Torna domani!</p><a href='index.html' style='display:block; margin-top:20px; color:#0ea5e9; font-weight:bold;'>← Home</a>";
}

loadQ();
</script>
</body>
</html>
