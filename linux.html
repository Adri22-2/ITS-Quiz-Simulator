<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Linux ITS</title>
    <style>
        :root { --primary: #3b82f6; --correct: #22c55e; --wrong: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 40px; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 90%; max-width: 600px; border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #334155; padding-bottom: 15px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        .btn-home { color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .question { font-size: 1.15rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .option { background-color: #334155; border: 2px solid transparent; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { background-color: #475569; border-color: var(--primary); }
        .option.correct { background-color: var(--correct); border-color: #15803d; color: white; }
        .option.wrong { background-color: var(--wrong); border-color: #991b1b; color: white; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; line-height: 1.4; font-size: 0.95rem; background: #334155; border-left: 5px solid var(--primary); }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .next-btn:hover { background-color: #2563eb; }
        .progress { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-home">← Torna alla Dashboard</a>
    <div class="header">
        <div class="progress" id="progress">Domanda 1 di 10</div>
        <h1>🐧 Linux & Bash Master</h1>
    </div>
    
    <div id="quiz">
        <div class="question" id="question-text">Caricamento domanda...</div>
        <div id="options-container"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda →</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Quale comando permette di visualizzare i permessi dettagliati di un file?",
            a: ["ls -p", "ls -l", "show --permissions", "chmod -list"],
            c: 1,
            f: "Il comando 'ls -l' (long format) mostra i permessi (rwx), il proprietario, il gruppo e la data di modifica."
        },
        {
            q: "Cosa fa il comando 'chmod 777 nomefile'?",
            a: ["Rende il file invisibile", "Sola lettura per tutti", "Permessi totali (lettura, scrittura, esecuzione) per tutti", "Elimina il file"],
            c: 2,
            f: "777 in ottale significa 111 (rwx) per Owner, Group e Others. È considerato un rischio di sicurezza."
        },
        {
            q: "Quale directory contiene i file di configurazione del sistema?",
            a: ["/bin", "/home", "/etc", "/var"],
            c: 2,
            f: "/etc è la cartella standard per i file di configurazione (es. /etc/ssh/sshd_config)."
        },
        {
            q: "Il comando 'sudo' serve a:",
            a: ["Spegnere il PC", "Eseguire un comando con privilegi di root", "Aggiornare i driver", "Creare un nuovo utente"],
            c: 1,
            f: "SUDO sta per 'SuperUser DO', permette agli utenti autorizzati di eseguire comandi come root."
        },
        {
            q: "Quale comando si usa per terminare un processo conoscendo il suo PID?",
            a: ["stop", "exit", "kill", "close"],
            c: 2,
            f: "Il comando 'kill [PID]' invia un segnale (default SIGTERM) per terminare il processo."
        },
        {
            q: "Cosa indica il simbolo '~' (tilde) nella bash?",
            a: ["La directory principale (root)", "La cartella dei file temporanei", "La directory Home dell'utente corrente", "Un errore di sintassi"],
            c: 2,
            f: "La tilde è una scorciatoia che punta sempre a /home/nomeutente."
        },
        {
            q: "Come si visualizzano le ultime 10 righe di un file di log?",
            a: ["head -n 10", "tail -n 10", "cat --last 10", "read -10"],
            c: 1,
            f: "TAIL (coda) mostra la fine del file, HEAD (testa) mostra l'inizio."
        },
        {
            q: "Quale comando mostra l'utilizzo della memoria RAM?",
            a: ["df -h", "free -m", "mem-show", "ps aux"],
            c: 1,
            f: "'free -m' mostra la RAM libera e occupata espressa in Megabytes."
        },
        {
            q: "In bash, cosa fa l'operatore '>'?",
            a: ["Confronta due numeri", "Concatena due file", "Redirige l'output sovrascrivendo il file", "Esegue un comando in background"],
            c: 2,
            f: "Il simbolo '>' invia l'output a un file cancellando il contenuto precedente. '>>' invece aggiunge in coda."
        },
        {
            q: "Quale comando permette di cambiare il proprietario di un file?",
            a: ["chmod", "chgrp", "chown", "passwd"],
            c: 2,
            f: "CHOWN (Change Owner) cambia l'utente proprietario e, opzionalmente, il gruppo."
        }
    ];

    let currentIdx = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const data = quizData[currentIdx];
        document.getElementById("progress").innerText = `Domanda ${currentIdx + 1} di ${quizData.length}`;
        document.getElementById("question-text").innerText = data.q;
        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        data.a.forEach((option, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = option;
            div.onclick = () => selectOption(i, div);
            container.appendChild(div);
        });
    }

    function selectOption(idx, element) {
        if (answered) return;
        answered = true;
        const data = quizData[currentIdx];
        const options = document.getElementsByClassName("option");
        
        if (idx === data.c) {
            element.classList.add("correct");
        } else {
            element.classList.add("wrong");
            options[data.c].classList.add("correct");
        }
        
        const feedback = document.getElementById("feedback");
        feedback.innerHTML = `<strong>Spiegazione:</strong> ${data.f}`;
        feedback.style.display = "block";
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById("quiz").innerHTML = `<div style='text-align:center;'><h2>Complimenti! 🎉</h2><p>Hai terminato il modulo Linux.</p><a href='index.html' class='btn-home' style='background:#3b82f6; color:white; padding:10px; border-radius:8px;'>Torna alla Home</a></div>`;
        }
    }

    loadQuestion();
</script>

</body>
</html>
