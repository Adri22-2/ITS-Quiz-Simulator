<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domande Linux di Simulazione</title>
    <style>
        :root { --primary: #3b82f6; --correct: #22c55e; --wrong: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background-color: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px; margin-top: 40px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.6rem; }
        .progress { font-size: 0.9rem; color: #64748b; font-weight: bold; margin-bottom: 5px; }
        .btn-home { color: #64748b; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: #334155; }
        .option { background-color: #ffffff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; color: #475569; }
        .option:hover { background-color: #f8fafc; border-color: var(--primary); }
        .option.correct { background-color: #dcfce7 !important; border-color: var(--correct); color: #166534; font-weight: bold; }
        .option.wrong { background-color: #fee2e2 !important; border-color: var(--wrong); color: #991b1b; font-weight: bold; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #eff6ff; border-left: 5px solid var(--primary); color: #1e3a8a; }
        .next-btn { display: none; width: 100%; background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="btn-home">← Home</a>
    <div class="header">
        <div class="progress" id="progress">Caricamento...</div>
        <h1>Domande Linux di Simulazione</h1>
    </div>
    <div id="quiz-box">
        <div class="question" id="q-text"></div>
        <div id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Prossima Domanda →</button>
    </div>
</div>

<script>
const quizData = [
    { q: "Comando per vedere permessi dettagliati dei file?", a: ["ls -a", "ls -l", "ls -p", "dir"], c: 1, f: "ls -l (long) mostra permessi, owner, gruppo e data." },
    { q: "Cosa indica il permesso 755?", a: ["Solo lettura", "Owner tutto, altri lettura/esecuzione", "Accesso totale a tutti", "Nessuno"], c: 1, f: "7 (rwx) per l'owner, 5 (r-x) per gruppo e altri." },
    { q: "Comando per cambiare il proprietario di un file?", a: ["chmod", "chown", "chgrp", "usermod"], c: 1, f: "CHOWN sta per 'Change Owner'." },
    { q: "Directory che contiene i file di configurazione?", a: ["/bin", "/home", "/etc", "/var"], c: 2, f: "/etc è la cartella standard per le config di sistema." },
    { q: "A cosa serve il comando 'top'?", a: ["Vedere i file grandi", "Monitorare processi in tempo reale", "Andare a inizio file", "Installare"], c: 1, f: "Mostra CPU, RAM e i processi attivi in tempo reale." },
    { q: "Come visualizzi la cartella attuale?", a: ["ls", "whereami", "pwd", "dir"], c: 2, f: "PWD = Print Working Directory." },
    { q: "Comando per creare una directory?", a: ["mkdir", "mkfile", "newdir", "cd"], c: 0, f: "MKDIR = Make Directory." },
    { q: "Leggere log in tempo reale?", a: ["cat", "less", "tail -f", "head"], c: 2, f: "Tail -f (follow) segue le nuove righe aggiunte ai log." },
    { q: "Cosa fa '>' in Bash?", a: ["Confronta", "Aggiunge a fine file", "Sovrascrive il file", "Background"], c: 2, f: "Redirige l'output cancellando il contenuto precedente." },
    { q: "Segnale SIGKILL per chiudere un processo?", a: ["kill -1", "kill -9", "kill -15", "stop"], c: 1, f: "kill -9 termina forzatamente qualsiasi processo." },
    { q: "Cartella dei comandi binari base?", a: ["/root", "/etc", "/bin", "/tmp"], c: 2, f: "/bin contiene comandi come ls, cp, mv." },
    { q: "Significato di '~'?", a: ["Root", "Home utente corrente", "Cartella precedente", "Errore"], c: 1, f: "La tilde è la scorciatoia per /home/nomeutente." },
    { q: "Uso del disco per partizione?", a: ["du -h", "df -h", "disk-usage", "lsblk"], c: 1, f: "DF = Disk Free." },
    { q: "Gestore pacchetti Debian/Ubuntu?", a: ["yum", "apt", "dnf", "pkg"], c: 1, f: "APT è il gestore standard di queste distribuzioni." },
    { q: "Comando per riavviare?", a: ["exit", "reboot", "stop", "halt"], c: 1, f: "Semplice comando reboot o shutdown -r now." },
    { q: "Cosa fa 'chmod +x'?", a: ["Cripta", "Rende eseguibile", "Rende scrivibile", "Nasconde"], c: 1, f: "+x aggiunge il bit di esecuzione." },
    { q: "Editor di testo da terminale standard?", a: ["Notepad", "Vi / Vim", "Wordpad", "Sublime"], c: 1, f: "Vi è presente in quasi ogni sistema Linux." },
    { q: "Cosa indica '$?'?", a: ["PID", "Exit Status ultimo comando", "Durata", "Errore"], c: 1, f: "0 indica successo, altro indica un errore." },
    { q: "Vedere IP su Linux moderno?", a: ["ip addr", "ifconfig", "show ip", "net"], c: 0, f: "ip addr ha sostituito il vecchio ifconfig." },
    { q: "Cronologia dei comandi?", a: ["past", "logs", "history", "recall"], c: 2, f: "Mostra la lista dei comandi digitati in precedenza." },
    { q: "Cosa fa 'mkdir -p'?", a: ["3 cartelle", "Permessi", "Crea genitori se mancano", "Errore"], c: 2, f: "Crea l'intera gerarchia di cartelle specificata." },
    { q: "Cartella dei log?", a: ["/etc/logs", "/var/log", "/usr/log", "/tmp"], c: 1, f: "/var/log è dove risiedono i log del sistema." },
    { q: "Cosa fa 'grep'?", a: ["Cerca file", "Filtra testo", "Copia", "Sposta"], c: 1, f: "Cerca stringhe di testo all'interno di file o output." },
    { q: "Mostra dischi e partizioni?", a: ["fdisk -l", "ps aux", "man", "grep"], c: 0, f: "fdisk -l elenca i device e le partizioni." },
    { q: "Cos'è 'sudo'?", a: ["Super User Do", "System Under", "Simple Download", "Stop"], c: 0, f: "Esegue comandi con privilegi di root." },
    { q: "Tasto per uscire da 'less' o 'top'?", a: ["ESC", "CTRL+C", "q", "x"], c: 2, f: "La lettera 'q' chiude quasi tutti i tool interattivi." },
    { q: "Versione del Kernel?", a: ["version", "show-kernel", "uname -r", "sys"], c: 2, f: "uname -r (release) mostra il kernel in uso." },
    { q: "Archiviare e comprimere cartelle?", a: ["zip", "tar -czvf", "compress", "arc"], c: 1, f: "Tar è il tool standard per creare archivi compresi." },
    { q: "Shebang corretto per Bash?", a: ["#bash", "#!/bin/bash", "//bin/bash", "#/root"], c: 1, f: "Indica al kernel quale interprete usare per lo script." },
    { q: "Cosa fa 'cd ..'?", a: ["Home", "Torna su di un livello", "Precedente", "Chiudi"], c: 1, f: "Sposta la navigazione nella cartella padre." }
];

let current = 0; let answered = false;
function loadQ() {
    answered = false; const d = quizData[current];
    document.getElementById('progress').innerText = `Domanda ${current+1} di ${quizData.length}`;
    document.getElementById('q-text').innerText = d.q;
    const optCont = document.getElementById('options'); optCont.innerHTML = '';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    d.a.forEach((o, i) => {
        const btn = document.createElement('div'); btn.className = 'option';
        btn.innerText = o; btn.onclick = () => check(i, btn);
        optCont.appendChild(btn);
    });
}
function check(i, btn) {
    if(answered) return; answered = true; const d = quizData[current];
    const opts = document.getElementsByClassName('option');
    if(i === d.c) btn.classList.add('correct');
    else { btn.classList.add('wrong'); opts[d.c].classList.add('correct'); }
    document.getElementById('feedback').innerHTML = `<strong>Spiegazione:</strong> ${d.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}
function nextQuestion() {
    current++; if(current < quizData.length) loadQ();
    else document.getElementById('quiz-box').innerHTML = "<h2>Fine Quiz Linux! 🐧</h2><a href='index.html' style='color:#3b82f6;'>Torna alla Home</a>";
}
loadQ();
</script>
</body>
</html>
