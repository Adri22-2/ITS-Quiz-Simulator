<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Linux ITS</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #1e293b; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 30px; padding-bottom: 20px; }
        .question-box { margin-bottom: 25px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; transition: 0.3s; }
        .question-text { font-size: 1.1em; font-weight: 600; margin-bottom: 15px; display: block; }
        .option { display: block; width: 100%; padding: 12px 15px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: left; background: white; font-size: 1em; transition: 0.2s; }
        .option:hover { border-color: var(--primary); background: #f0f7ff; }
        .option.correct { border-color: var(--success); background: #dcfce7; color: #166534; }
        .option.wrong { border-color: var(--error); background: #fee2e2; color: #991b1b; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.9em; display: none; }
        .score-box { text-align: center; font-size: 1.5em; font-weight: bold; margin-top: 30px; padding: 20px; background: #f1f5f9; border-radius: 10px; }
        .btn-home { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-home">← Torna al Menu Principale</a>
    <div class="header">
        <h1>🐧 Simulatore Quiz Linux</h1>
        <p>Modulo: Amministrazione di Sistema Open Source</p>
        <div id="progress">Domanda 1 di 30</div>
    </div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-text" id="q-text">Caricamento domanda...</span>
            <div id="options-container"></div>
            <div id="feedback-box" class="feedback"></div>
        </div>
        <button id="next-btn" style="display:none; width:100%; padding:15px; background: var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Prossima Domanda</button>
    </div>

    <div id="result-area" style="display:none;"></div>
</div>

<script>
    const quizData = [
        { q: "Quale comando mostra i permessi dettagliati di file e directory?", a: ["ls -a", "ls -l", "ls -p", "dir /s"], c: 1, f: "LS -L (Long) mostra permessi, proprietario e dimensione." },
        { q: "Quale permesso corrisponde al valore ottale 7?", a: ["Sola lettura", "Lettura e scrittura", "Lettura, scrittura ed esecuzione", "Sola esecuzione"], c: 2, f: "7 è dato dalla somma di 4 (R) + 2 (W) + 1 (X)." },
        { q: "Quale comando si usa per cambiare il proprietario di un file?", a: ["chmod", "chown", "chgrp", "usermod"], c: 1, f: "CHOWN sta per Change Owner." },
        { q: "Cosa contiene la directory /etc?", a: ["File binari", "File di configurazione", "File temporanei", "Home degli utenti"], c: 1, f: "/etc è la cartella standard per la configurazione del sistema." },
        { q: "Quale comando permette di visualizzare i processi attivi in tempo reale?", a: ["ps -aux", "top", "list-proc", "taskmgr"], c: 1, f: "TOP mostra una tabella dinamica dei processi e risorse." },
        { q: "Come si forza la chiusura di un processo con ID 1234?", a: ["stop 1234", "end 1234", "kill -9 1234", "exit 1234"], c: 2, f: "KILL -9 invia il segnale SIGKILL per la chiusura forzata." },
        { q: "Quale comando visualizza le ultime righe di un file di log?", a: ["head", "cat", "tail", "more"], c: 2, f: "TAIL mostra la 'coda' del file, utilissimo per i log." },
        { q: "Cosa fa il comando 'chmod 644 file.txt'?", a: ["Tutti possono scrivere", "Owner legge/scrive, altri solo leggono", "Esecuzione per tutti", "File nascosto"], c: 1, f: "6(RW-) 4(R--) 4(R--)." },
        { q: "Quale simbolo si usa per la 'pipe' (concatenazione comandi)?", a: [">", "<", "|", "&"], c: 2, f: "La PIPE | passa l'output di un comando come input al successivo." },
        { q: "In Linux, l'utente con ID 0 è sempre:", a: ["L'ospite", "L'ultimo creato", "Il root", "Il primo utente umano"], c: 2, f: "UID 0 è riservato esclusivamente all'utente root." }
        // ... (Aggiungi qui le altre 20 domande seguendo lo stesso formato)
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const data = quizData[currentQ];
        document.getElementById('progress').innerText = `Domanda ${currentQ + 1} di ${quizData.length}`;
        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        data.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correct = quizData[currentQ].c;
        const options = document.querySelectorAll('.option');
        options.forEach(b => b.style.pointerEvents = 'none');

        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'block';
        feedback.innerText = quizData[currentQ].f;

        if(idx === correct) {
            btn.classList.add('correct');
            feedback.style.background = '#dcfce7';
            score++;
        } else {
            btn.classList.add('wrong');
            options[correct].classList.add('correct');
            feedback.style.background = '#fee2e2';
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    document.getElementById('next-btn').onclick = () => {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        res.innerHTML = `
            <div class="score-box">
                Quiz Completato!<br>
                Punteggio: ${score} / ${quizData.length}
            </div>
            <p>Ottimo lavoro! Torna al menu per provare un altro modulo o ricarica per riprovare questo.</p>
            <a href="index.html" class="btn-home" style="background:var(--primary); color:white; padding:10px 20px; border-radius:8px;">Vai alla Home</a>
        `;
    }

    loadQuestion();
</script>
</body>
</html>
