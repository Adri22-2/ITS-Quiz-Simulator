<!DOCTYPE html>
<html lang="it">
<head>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h1 { color: #1e293b; margin-bottom: 5px; font-size: 2rem; }

        .menu-btn:hover { border-color: #3b82f6; background: #eff6ff; transform: translateY(-3px); }
        .icon { font-size: 1.3em; margin-right: 10px; }
        .badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-size: 0.75em; }

    <div class="card">

        <a href="networking.html" class="menu-btn">
